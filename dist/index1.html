<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>辽宁大学心理学院</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {

  background: #f5f5f5;
}
.container {
  width: 1200px;

}

}

}
.nav a:hover {

}
.banner {
  height: 320px;
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #666;
}

}

  padding-left: 20px;

.box-title {
  background: #045a9b;
  color: white;
  padding: 10px 15px;
  font-weight: bold;
}
.box-content {

.footer {
