<style>
/* 核心：用 flex 布局让页面自动占满高度，footer 贴底 */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}
/* 页面整体容器：flex 垂直布局，占满屏幕 */
.wrapper {
  display: flex;
  flex-direction: column; /* 垂直排列 */
  min-height: 100%;
  width: 1200px;
  margin: 0 auto;
  background: white;
}
/* 内容区：自动填充剩余空间，footer 自然贴底 */
.content {
  flex: 1;
  padding: 0 30px 20px; /* 底部留空白，避免和 footer 贴太近 */
}
/* 头部 */
.header {
  height: 120px;
  background: #036;
  color: white;
  line-height: 120px;
  padding-left: 30px;
  font-size: 28px;
  font-weight: bold;
}
/* 导航 */
.nav {
  background: #045a9b;
  overflow: hidden;
}
.nav a {
  color: white;
  padding: 15px 25px;
  display: inline-block;
  text-decoration: none;
}
.nav a:hover {
  background: #036;
}
/* 盒子样式 */
.box {
  margin-top: 20px;
  border: 1px solid #ddd;
}
.box-title {
  background: #045a9b;
  color: white;
  padding: 10px 15px;
  font-weight: bold;
}
/* 左右分栏 */
.split-container {
  display: flex;
  gap: 0;
}
.split-left, .split-right {
  width: 50%;
  padding: 30px;
}
.split-left {
  border-right: 1px solid #ddd;
}
.split-right ul {
  list-style: none;
  padding: 0;
}
.split-right li {
  margin: 12px 0;
}
.split-right a {
  color: #000;
  text-decoration: underline;
  font-size: 20px;
}
.split-right a:hover {
  color: #005599;
}
/* footer：固定显示在底部，不会消失 */
.footer {
  background: #036;
  color: white;
  text-align: center;
  padding: 20px;
  width: 100%;
  margin-top: auto; /* 关键：自动贴到底部 */
}
</style>
</head>

</div>
